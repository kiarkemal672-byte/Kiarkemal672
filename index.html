<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Clone - Full Stack</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        :root {
            --tg-blue: #2AABEE;
            --tg-blue-dark: #229ED9;
            --tg-bg: #0E1621;
            --tg-bg-secondary: #17212B;
            --tg-bg-tertiary: #232E3C;
            --tg-text: #FFFFFF;
            --tg-text-secondary: #708499;
            --tg-message-out: #2B5278;
            --tg-message-in: #182533;
            --tg-border: #10C677;
            --tg-red: #E53935;
            --tg-hover: #202B36;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--tg-bg); color: var(--tg-text); overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        input, button, textarea { font-family: inherit; outline: none; border: none; }
        .hidden { display: none !important; }
        
        /* Auth Screen */
        #authScreen { width: 100%; max-width: 400px; background: var(--tg-bg-secondary); padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); position: relative; }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h1 { color: var(--tg-blue); font-size: 28px; margin-bottom: 10px; }
        .auth-header p { color: var(--tg-text-secondary); font-size: 14px; }
        .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid var(--tg-bg-tertiary); }
        .auth-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; color: var(--tg-text-secondary); font-weight: 600; transition: all 0.2s; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .auth-tab.active { color: var(--tg-blue); border-bottom-color: var(--tg-blue); }
        .auth-form input { width: 100%; padding: 15px; margin-bottom: 15px; background: var(--tg-bg); border-radius: 8px; color: var(--tg-text); border: 1px solid transparent; transition: border 0.2s; }
        .auth-form input:focus { border-color: var(--tg-blue); }
        .auth-form button { width: 100%; padding: 15px; background: var(--tg-blue); color: white; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .auth-form button:hover { background: var(--tg-blue-dark); }
        .forgot-link { display: block; text-align: left; color: var(--tg-text-secondary); font-size: 13px; cursor: pointer; margin-bottom: 15px; margin-top: -5px; }
        .forgot-link:hover { color: var(--tg-blue); }
        .amir-admin-btn { position: absolute; top: 15px; left: 15px; background: var(--tg-bg-tertiary); color: var(--tg-text-secondary); padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        
        /* Main App Layout */
        #appContainer { display: flex; width: 100%; height: 100vh; max-width: 1400px; margin: 0 auto; }
        
        /* Sidebar */
        .sidebar { width: 30%; min-width: 320px; max-width: 420px; background: var(--tg-bg-secondary); border-left: 1px solid var(--tg-bg-tertiary); display: flex; flex-direction: column; }
        .sidebar-header { padding: 10px; display: flex; align-items: center; gap: 10px; }
        .menu-btn { background: none; color: var(--tg-text-secondary); font-size: 20px; cursor: pointer; padding: 8px; border-radius: 50%; }
        .menu-btn:hover { background: var(--tg-hover); }
        .search-bar { flex: 1; background: var(--tg-bg); border-radius: 20px; padding: 8px 15px; color: var(--tg-text); }
        .tabs-nav { display: flex; padding: 0 10px; border-bottom: 1px solid var(--tg-bg-tertiary); }
        .tab-btn { flex: 1; padding: 10px; text-align: center; background: none; color: var(--tg-text-secondary); cursor: pointer; font-size: 14px; font-weight: 500; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--tg-blue); border-bottom-color: var(--tg-blue); }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-list::-webkit-scrollbar { width: 6px; }
        .chat-list::-webkit-scrollbar-thumb { background: var(--tg-bg-tertiary); border-radius: 3px; }
        .chat-item { display: flex; padding: 10px; cursor: pointer; align-items: center; gap: 10px; border-bottom: 1px solid var(--tg-bg); }
        .chat-item:hover, .chat-item.active { background: var(--tg-hover); }
        .chat-avatar { width: 54px; height: 54px; border-radius: 50%; background: var(--tg-blue); display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; font-weight: bold; overflow: hidden; flex-shrink: 0; }
        .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-info { flex: 1; overflow: hidden; }
        .chat-top-row { display: flex; justify-content: space-between; align-items: center; }
        .chat-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 12px; color: var(--tg-text-secondary); }
        .chat-bottom-row { display: flex; justify-content: space-between; align-items: center; }
        .chat-last-msg { font-size: 14px; color: var(--tg-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .unread-badge { background: var(--tg-blue); color: white; border-radius: 10px; padding: 2px 8px; font-size: 12px; font-weight: bold; min-width: 20px; text-align: center; }
        .pinned-icon { color: var(--tg-text-secondary); font-size: 14px; }
        
        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; background-image: url('data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAkGBxITEhUTExMWFRUXGBgYGBgYGBgYGBgYGBgYGBgYGBgYHSggGBolHRgYITEhJSkrLi4uFx8zODMtNygtLisBCgoKDg0OGxAQGy0lHyUtLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLf/AABEIALEBHAMBIgACEQEDEQH/xAAaAAEBAQEBAQEAAAAAAAAAAAAAAQIDBAUH/8QAFxEBAQEBAAAAAAAAAAAAAAAAAAABEv/EABsQAQEBAAMBAQAAAAAAAAAAAAABAhEDIUFx/9oADAMBAAIRAxEAPwD8AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAMlp52p2r1Nq0nN1G9GwY29n5TrO92o9o/8SqPw0d9F12jplsv7H0OU9LtW96tI9Gk2dTH0KBqIAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAJG7rJ6o5S2tPNHAO9ibRy0GY9pdE0abY0s0kdicgAGSc0Mmn1GjS1s0ZpJK5G4AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAB5DU6lTLW26bI16NAAu5AA5AAu5AAOQALuQALuQALuQALuQALuQALuQALuQALuQALuQD/2Q=='); background-size: cover; background-position: center; }
        .chat-header { background: var(--tg-bg-secondary); padding: 10px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--tg-bg-tertiary); }
        .chat-header .back-btn { display: none; background: none; color: var(--tg-text); font-size: 20px; cursor: pointer; }
        .chat-header-info { flex: 1; }
        .chat-header-name { font-weight: 600; font-size: 16px; }
        .chat-header-status { font-size: 13px; color: var(--tg-text-secondary); }
        .chat-header-actions button { background: none; color: var(--tg-text-secondary); font-size: 20px; cursor: pointer; padding: 8px; border-radius: 50%; }
        .chat-header-actions button:hover { background: var(--tg-hover); }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 2px; }
        .messages-container::-webkit-scrollbar { width: 6px; }
        .messages-container::-webkit-scrollbar-thumb { background: var(--tg-bg-tertiary); border-radius: 3px; }
        .message { max-width: 70%; padding: 8px 12px; border-radius: 12px; margin-top: 2px; position: relative; word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.1); user-select: text; }
        .message.out { background: var(--tg-message-out); align-self: flex-end; border-bottom-right-radius: 2px; }
        .message.in { background: var(--tg-message-in); align-self: flex-start; border-bottom-left-radius: 2px; }
        .message-sender { font-size: 13px; color: var(--tg-blue); font-weight: 600; margin-bottom: 2px; }
        .message-text { font-size: 15px; line-height: 1.4; white-space: pre-wrap; }
        .message-img { max-width: 100%; border-radius: 8px; cursor: pointer; display: block; margin-bottom: 5px; }
        .message-time { font-size: 11px; color: var(--tg-text-secondary); text-align: left; margin-top: 4px; }
        .message-reply-preview { border-right: 3px solid var(--tg-blue); padding: 2px 8px; margin-bottom: 5px; background: rgba(0,0,0,0.2); border-radius: 4px; font-size: 13px; }
        .pinned-msg { background: var(--tg-bg-tertiary); padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; border-right: 4px solid var(--tg-blue); }
        
        .message-input-area { background: var(--tg-bg-secondary); padding: 10px 20px; display: flex; align-items: flex-end; gap: 10px; border-top: 1px solid var(--tg-bg-tertiary); }
        .attach-btn { background: none; color: var(--tg-text-secondary); font-size: 24px; cursor: pointer; padding: 5px; }
        .message-input { flex: 1; background: var(--tg-bg); border-radius: 20px; padding: 12px 15px; color: var(--tg-text); resize: none; max-height: 120px; line-height: 1.4; }
        .send-btn { background: var(--tg-blue); color: white; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; transition: transform 0.1s; }
        .send-btn:hover { transform: scale(1.05); }
        
        /* Modals & Menus */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: var(--tg-bg-secondary); padding: 20px; border-radius: 12px; width: 90%; max-width: 450px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 20px; font-weight: 600; }
        .modal-close { background: none; color: var(--tg-text-secondary); font-size: 24px; cursor: pointer; }
        .modal-input { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--tg-bg); border-radius: 8px; color: var(--tg-text); border: 1px solid transparent; }
        .modal-input:focus { border-color: var(--tg-blue); }
        .modal-btn { padding: 12px 20px; background: var(--tg-blue); color: white; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }
        .modal-btn:hover { background: var(--tg-blue-dark); }
        .modal-btn-secondary { background: var(--tg-bg-tertiary); margin-top: 10px; }
        
        .context-menu { position: fixed; background: var(--tg-bg-tertiary); border-radius: 8px; padding: 5px 0; z-index: 200; min-width: 180px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .context-item { padding: 10px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .context-item:hover { background: var(--tg-hover); }
        .context-item.danger { color: var(--tg-red); }
        
        /* Lightbox */
        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 300; cursor: zoom-out; }
        #lightbox img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 4px; }
        
        /* Family Tree */
        .tree-node { background: var(--tg-bg); padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--tg-bg-tertiary); position: relative; }
        .tree-node h4 { margin-bottom: 10px; color: var(--tg-blue); display: flex; justify-content: space-between; }
        .tree-node input { width: 100%; margin-bottom: 8px; background: var(--tg-bg-secondary); }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar { width: 100%; max-width: 100%; position: absolute; z-index: 10; transition: transform 0.2s; }
            .sidebar.hidden-mobile { transform: translateX(100%); }
            .chat-area { width: 100%; }
            .chat-header .back-btn { display: block; }
            .message { max-width: 85%; }
        }
    </style>
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="authScreen" class="auth-container">
        <button class="amir-admin-btn" onclick="openAmirAdminLogin()">Amir Admin</button>
        <div class="auth-header">
            <h1>Telegram Clone</h1>
            <p id="authSubtitle">Sign in to your account</p>
        </div>
        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchAuthTab('signin', 'Sign In')">تسجيل الدخول</div>
            <div class="auth-tab" onclick="switchAuthTab('signup', 'Create New Account')">التسجيل من جديد</div>
        </div>
        
        <!-- Sign In -->
        <div id="signinForm" class="auth-form">
            <input type="text" id="loginUsername" placeholder="Username">
            <input type="password" id="loginPassword" placeholder="Password">
            <span class="forgot-link" onclick="showForgotPassword()">نسيت كلمة المرور؟</span>
            <button onclick="handleLogin()">Sign In</button>
        </div>

        <!-- Sign Up -->
        <div id="signupForm" class="auth-form hidden">
            <input type="text" id="suName" placeholder="Full Name">
            <input type="text" id="suUsername" placeholder="Username">
            <input type="password" id="suPassword" placeholder="Password">
            <input type="tel" id="suPhone" placeholder="رقم الهاتف (Phone)">
            <input type="email" id="suEmail" placeholder="البريد الإلكتروني (Email)">
            <button onclick="handleSignup()">Create Account</button>
        </div>

        <!-- Forgot Password -->
        <div id="forgotForm" class="auth-form hidden">
            <input type="email" id="fpEmail" placeholder="Registered Email">
            <button onclick="sendOTP()">Send OTP Code</button>
            <div id="otpSection" class="hidden" style="margin-top:15px;">
                <input type="text" id="otpCode" placeholder="4-digit OTP Code" maxlength="4">
                <input type="password" id="newPass" placeholder="New Password">
                <button onclick="resetPassword()">Reset Password</button>
            </div>
            <button class="modal-btn modal-btn-secondary" onclick="switchAuthTab('signin', 'Sign In')">Back to Login</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="appContainer" class="hidden">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="menu-btn" onclick="openMenu()">☰</button>
                <input type="text" class="search-bar" id="globalSearch" placeholder="Search" oninput="renderChatList()">
            </div>
            <div class="tabs-nav">
                <button class="tab-btn active" onclick="filterChats('all', this)">الكل</button>
                <button class="tab-btn" onclick="filterChats('personal', this)">الخاص</button>
                <button class="tab-btn" onclick="filterChats('groups', this)">المجموعات</button>
                <button class="tab-btn" onclick="filterChats('channels', this)">القنوات</button>
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="chat-header" id="chatHeader" style="display:none;">
                <button class="back-btn" onclick="toggleMobileSidebar()">←</button>
                <div class="chat-avatar" id="chatHeaderAvatar" onclick="openProfile(currentChatId)">A</div>
                <div class="chat-header-info" onclick="openProfile(currentChatId)">
                    <div class="chat-header-name" id="chatHeaderName"></div>
                    <div class="chat-header-status" id="chatHeaderStatus"></div>
                </div>
                <div class="chat-header-actions">
                    <button onclick="addMemberPrompt()">➕</button>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="message-input-area" id="messageInputArea" style="display:none;">
                <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
                <input type="file" id="fileInput" class="hidden" onchange="handleFileSelect(event)">
                <textarea class="message-input" id="messageInput" rows="1" placeholder="Message..." oninput="autoResize(this)" onkeydown="handleEnterKey(event)"></textarea>
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modalRoot"></div>
    <div id="contextMenu" class="context-menu hidden"></div>
    <div id="lightbox" class="hidden" onclick="closeLightbox()"><img id="lightboxImg" src=""></div>

    <script>
        // --- GLOBAL STATE & DB ---
        let db;
        let currentUser = null;
        let currentChatId = null;
        let currentFilter = 'all';
        let replyTo = null;
        let editingMsg = null;
        let pressedMsgId = null;
        let pressTimer = null;

        const DB_NAME = 'TelegramCloneDB';
        const DB_VERSION = 1;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                // Clean up dummy data from previous attempts (Fresh start)
                request.onupgradeneeded = function(e) {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains('users')) {
                        db.createObjectStore('users', { keyPath: 'id' });
                    }
                    if (!db.objectStoreNames.contains('chats')) {
                        const chatStore = db.createObjectStore('chats', { keyPath: 'id' });
                        chatStore.createIndex('ownerId', 'ownerId', { unique: false });
                    }
                    if (!db.objectStoreNames.contains('messages')) {
                        const msgStore = db.createObjectStore('messages', { keyPath: 'id' });
                        msgStore.createIndex('chatId', 'chatId', { unique: false });
                    }
                };

                request.onsuccess = function(e) {
                    db = e.target.result;
                    // Ensure Amir exists
                    dbGet('users', 'amir').then(amir => {
                        if (!amir) {
                            const amirUser = {
                                id: 'amir',
                                username: 'amir',
                                password: 'amiradmin',
                                name: 'Amir (Admin)',
                                phone: '000000',
                                email: 'amir@admin.com',
                                pic: '',
                                bio: 'System Administrator',
                                isAmir: true,
                                familyTree: { spouse: { name: '', pic: '' }, children: [] },
                                contacts: []
                            };
                            dbPut('users', amirUser);
                        }
                        resolve();
                    });
                };
                request.onerror = (e) => reject(e);
            });
        }

        function dbPut(store, data) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readwrite');
                tx.objectStore(store).put(data);
                tx.oncomplete = () => resolve(true);
                tx.onerror = (e) => reject(e);
            });
        }

        function dbGet(store, key) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readonly');
                const req = tx.objectStore(store).get(key);
                req.onsuccess = () => resolve(req.result);
                req.onerror = (e) => reject(e);
            });
        }

        function dbGetAll(store) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readonly');
                const req = tx.objectStore(store).getAll();
                req.onsuccess = () => resolve(req.result);
                req.onerror = (e) => reject(e);
            });
        }

        function dbDelete(store, key) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readwrite');
                tx.objectStore(store).delete(key);
                tx.oncomplete = () => resolve(true);
                tx.onerror = (e) => reject(e);
            });
        }

        // --- EMAILJS INIT ---
        (function() {
            emailjs.init({ publicKey: "RVFFdHn5xRXW26Dbu" });
        })();

        let currentOTP = null;
        let resetEmailTarget = null;

        // --- AUTH LOGIC ---
        function switchAuthTab(tab, subtitle) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('authSubtitle').innerText = subtitle;
            
            document.getElementById('signinForm').classList.add('hidden');
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('forgotForm').classList.add('hidden');
            
            if (tab === 'signin') document.getElementById('signinForm').classList.remove('hidden');
            if (tab === 'signup') document.getElementById('signupForm').classList.remove('hidden');
            if (tab === 'forgot') document.getElementById('forgotForm').classList.remove('hidden');
        }

        function showForgotPassword() {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('authSubtitle').innerText = 'Reset Password';
            document.getElementById('signinForm').classList.add('hidden');
            document.getElementById('forgotForm').classList.remove('hidden');
        }

        async function sendOTP() {
            const email = document.getElementById('fpEmail').value;
            if (!email) return alert('Please enter your registered email.');
            
            const users = await dbGetAll('users');
            const user = users.find(u => u.email === email);
            if (!user) return alert('No account found with this email.');

            resetEmailTarget = email;
            currentOTP = Math.floor(1000 + Math.random() * 9000).toString();

            const templateParams = {
                to_email: email,
                to_name: user.name,
                otp_code: currentOTP
            };

            try {
                await emailjs.send('service_g1hwbnc', 'template_hpex3ar', templateParams);
                alert('OTP sent to your email!');
                document.getElementById('otpSection').classList.remove('hidden');
            } catch (error) {
                console.error('EmailJS Error:', error);
                alert('Failed to send OTP. Check console. Using dev bypass: ' + currentOTP);
                document.getElementById('otpSection').classList.remove('hidden');
            }
        }

        async function resetPassword() {
            const otp = document.getElementById('otpCode').value;
            const newPass = document.getElementById('newPass').value;

            if (otp !== currentOTP) return alert('Invalid OTP code.');
            if (newPass.length < 4) return alert('Password too short.');

            const users = await dbGetAll('users');
            const user = users.find(u => u.email === resetEmailTarget);
            user.password = newPass;
            await dbPut('users', user);
            alert('Password reset successfully! Please login.');
            switchAuthTab('signin', 'Sign In');
        }

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.toLowerCase();
            const password = document.getElementById('loginPassword').value;
            
            const user = await dbGet('users', username);
            if (!user || user.password !== password) {
                return alert('Invalid username or password.');
            }
            
            currentUser = user;
            await loadUserApp();
        }

        async function handleSignup() {
            const name = document.getElementById('suName').value;
            const username = document.getElementById('suUsername').value.toLowerCase();
            const password = document.getElementById('suPassword').value;
            const phone = document.getElementById('suPhone').value;
            const email = document.getElementById('suEmail').value;

            if (!name || !username || !password || !phone || !email) return alert('Please fill all fields.');
            
            const existing = await dbGet('users', username);
            if (existing) return alert('Username already taken.');

            const newUser = {
                id: username,
                username: username,
                password: password,
                name: name,
                phone: phone,
                email: email,
                pic: '',
                bio: 'Hey there! I am using Telegram Clone.',
                isAmir: false,
                familyTree: { spouse: { name: '', pic: '' }, children: [] },
                contacts: []
            };

            await dbPut('users', newUser);
            
            // Create Saved Messages Chat
            const savedChat = {
                id: 'saved_' + username,
                type: 'saved',

        // --- CHAT LIST & SEARCH ---
        async function renderChatList() {
            const searchQuery = document.getElementById('globalSearch').value.toLowerCase();
            const allChats = await dbGetAll('chats');
            const userChats = allChats.filter(c => 
                c.ownerId === currentUser.id || c.members.includes(currentUser.id)
            );

            // Sort: Saved first, then by name
            userChats.sort((a, b) => {
                if (a.type === 'saved') return -1;
                if (b.type === 'saved') return 1;
                return a.name.localeCompare(b.name);
            });

            const filteredChats = userChats.filter(c => {
                if (currentFilter === 'personal' && c.type !== 'personal' && c.type !== 'saved') return false;
                if (currentFilter === 'groups' && c.type !== 'group') return false;
                if (currentFilter === 'channels' && c.type !== 'channel') return false;
                if (searchQuery && !c.name.toLowerCase().includes(searchQuery) && !c.username.toLowerCase().includes(searchQuery)) return false;
                return true;
            });

            const listEl = document.getElementById('chatList');
            listEl.innerHTML = '';
            
            for (const chat of filteredChats) {
                const lastMsgs = await getMessages(chat.id);
                const lastMsg = lastMsgs[lastMsgs.length - 1];
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                div.onclick = () => openChat(chat.id);
                
                const avatarContent = chat.pic ? `<img src="${chat.pic}">` : chat.name.charAt(0).toUpperCase();
                const lastMsgText = lastMsg ? (lastMsg.type === 'image' ? '📷 Photo' : lastMsg.text) : 'No messages yet';
                
                div.innerHTML = `
                    <div class="chat-avatar">${avatarContent}</div>
                    <div class="chat-info">
                        <div class="chat-top-row">
                            <div class="chat-name">${chat.name}</div>
                            <div class="chat-time">${chat.type === 'saved' ? '📌' : ''}</div>
                        </div>
                        <div class="chat-bottom-row">
                            <div class="chat-last-msg">${lastMsgText}</div>
                            ${chat.unreadCount > 0 ? `<div class="unread-badge">${chat.unreadCount}</div>` : ''}
                        </div>
                    </div>
                `;
                listEl.appendChild(div);
            }
        }

        function filterChats(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            renderChatList();
        }

        // --- CHAT OPEN & RENDER MESSAGES ---
        async function openChat(chatId) {
            currentChatId = chatId;
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('messageInputArea').style.display = 'flex';
            
            const chat = await dbGet('chats', chatId);
            chat.unreadCount = 0;
            await dbPut('chats', chat);
            
            document.getElementById('chatHeaderName').innerText = chat.name;
            document.getElementById('chatHeaderStatus').innerText = chat.type === 'channel' ? 'Channel' : (chat.type === 'group' ? `${chat.members.length} members` : 'Online');
            const avEl = document.getElementById('chatHeaderAvatar');
            avEl.innerHTML = chat.pic ? `<img src="${chat.pic}">` : chat.name.charAt(0).toUpperCase();
            
            await renderChatList();
            await renderMessages(chatId);
            toggleMobileSidebar(true);
        }

        async function renderMessages(chatId) {
            const cont = document.getElementById('messagesContainer');
            cont.innerHTML = '';
            const msgs = await getMessages(chatId);
            
            msgs.forEach(msg => {
                cont.appendChild(createMessageElement(msg));
            });
            cont.scrollTop = cont.scrollHeight;
        }

        function createMessageElement(msg) {
            const div = document.createElement('div');
            div.className = `message ${msg.senderId === currentUser.id ? 'out' : 'in'}`;
            div.setAttribute('data-msg-id', msg.id);
            
            let html = '';
            if (msg.senderId !== currentUser.id && currentChatId && (msg.chatId === currentChatId)) {
                // Show sender name in groups
            }
            
            if (msg.replyTo) {
                html += `<div class="message-reply-preview"><b>Reply:</b> ${msg.replyTo.text || 'Media'}</div>`;
            }
            
            if (msg.type === 'image') {
                html += `<img src="${msg.media}" class="message-img" onclick="openLightbox('${msg.media}')">`;
            }
            
            if (msg.text) {
                html += `<div class="message-text">${msg.text}</div>`;
            }
            
            html += `<div class="message-time">${new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>`;
            div.innerHTML = html;
            
            // Gestures
            div.addEventListener('contextmenu', (e) => { e.preventDefault(); showContextMenu(e, msg); });
            div.addEventListener('touchstart', (e) => { startLongPress(e, msg); });
            div.addEventListener('touchend', clearLongPress);
            div.addEventListener('mousedown', (e) => { startLongPress(e, msg); });
            div.addEventListener('mouseup', clearLongPress);
            div.addEventListener('mousemove', clearLongPress);
            
            return div;
        }

        function startLongPress(e, msg) {
            pressedMsgId = msg.id;
            pressTimer = setTimeout(() => {
                showContextMenu({ clientX: e.touches ? e.touches[0].clientX : e.clientX, clientY: e.touches ? e.touches[0].clientY : e.clientY }, msg);
            }, 500);
        }

        function clearLongPress() {
            clearTimeout(pressTimer);
        }

        async function getMessages(chatId) {
            const allMsgs = await dbGetAll('messages');
            return allMsgs.filter(m => m.chatId === chatId).sort((a,b) => a.timestamp - b.timestamp);
        }

        // --- SEND MESSAGES ---
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChatId) return;
            
            if (editingMsg) {
                editingMsg.text = text;
                editingMsg.edited = true;
                await dbPut('messages', editingMsg);
                editingMsg = null;
                input.value = '';
                autoResize(input);
                await renderMessages(currentChatId);
                return;
            }

            const msg = {
                id: 'msg_' + Date.now() + Math.random().toString(36).substr(2, 5),
                chatId: currentChatId,
                senderId: currentUser.id,
                senderName: currentUser.name,
                text: text,
                type: 'text',
                timestamp: Date.now(),
                replyTo: replyTo
            };
            
            await dbPut('messages', msg);
            replyTo = null;
            input.value = '';
            autoResize(input);
            await renderMessages(currentChatId);
            
            // Simulate delivery notification if other user
            const chat = await dbGet('chats', currentChatId);
            if (chat.type !== 'saved' && chat.members.length > 1) {
                showNotification(chat.name, text);
            }
        }

        function handleEnterKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = (el.scrollHeight) + 'px';
        }

        // --- FILE UPLOAD ---
        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file || !currentChatId) return;
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const msg = {
                    id: 'msg_' + Date.now() + Math.random().toString(36).substr(2, 5),
                    chatId: currentChatId,
                    senderId: currentUser.id,
                    senderName: currentUser.name,
                    text: '',
                    type: file.type.startsWith('image/') ? 'image' : 'file',
                    media: e.target.result,
                    fileName: file.name,
                    timestamp: Date.now(),
                    replyTo: replyTo
                };
                await dbPut('messages', msg);
                await renderMessages(currentChatId);
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        // --- CONTEXT MENU (GESTURES) ---
        function showContextMenu(e, msg) {
            clearLongPress();
            const menu = document.getElementById('contextMenu');
            const isOut = msg.senderId === currentUser.id;
            
            menu.innerHTML = `
                <div class="context-item" onclick="handleContextAction('reply', '${msg.id}')">↩️ Reply (رد)</div>
                <div class="context-item" onclick="handleContextAction('forward', '${msg.id}')">➡️ Forward (إعادة توجيه)</div>
                <div class="context-item" onclick="handleContextAction('pin', '${msg.id}')">📌 Pin (تثبيت)</div>
                ${isOut ? `<div class="context-item" onclick="handleContextAction('edit', '${msg.id}')">✏️ Edit (تعديل)</div>` : ''}
                <div class="context-item danger" onclick="handleContextAction('delete', '${msg.id}')">🗑️ Delete (حذف)</div>
            `;
            
            menu.style.top = `${e.clientY}px`;
            menu.style.left = `${e.clientX}px`;
            menu.classList.remove('hidden');
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.context-menu') && !e.target.closest('.message')) {
                document.getElementById('contextMenu').classList.add('hidden');
            }
        });

        async function handleContextAction(action, msgId) {
            document.getElementById('contextMenu').classList.add('hidden');
            const msgs = await getMessages(currentChatId);
            const msg = msgs.find(m => m.id === msgId);
            
            if (action === 'reply') {
                replyTo = msg;
                document.getElementById('messageInput').focus();
            } else if (action === 'delete') {
                await dbDelete('messages', msgId);
                await renderMessages(currentChatId);
            } else if (action === 'edit') {
                editingMsg = msg;
                const input = document.getElementById('messageInput');
                input.value = msg.text;
                input.focus();
            } else if (action === 'pin') {
                const chat = await dbGet('chats', currentChatId);
                chat.pinnedMsg = msg;
                await dbPut('chats', chat);
                alert('Message Pinned!');
            } else if (action === 'forward') {
                const targetId = prompt('Enter Chat ID or Username to forward to:');
                if (targetId) {
                    const newMsg = {...msg, id: 'msg_' + Date.now(), chatId: targetId, timestamp: Date.now()};
                    await dbPut('messages', newMsg);
                    alert('Message Forwarded!');
                }
            }
        }

        async function createNewChat(type) {
            const name = document.getElementById('newChatName').value;
            const username = document.getElementById('newChatUsername').value.toLowerCase();

            const membersInput = type !== 'personal' ? document.getElementById('newChatMembers').value : '';

            const members = [currentUser.id];
            if (membersInput) {
                const arr = membersInput.split(',').map(u => u.trim().toLowerCase());

                    if (userExists) members.push(u);

            const chatId = 'chat_' + Date.now();

                type: type,
                name: name,
                username: username,
                pic: pic,
                ownerId: currentUser.id,
                members: members,
                unreadCount: 0

            closeModal();
            await renderChatList();
            openChat(chatId);

        function toggleMobileSidebar(forceHide) {
            const sb = document.getElementById('sidebar');
            if (window.innerWidth <= 768) {
                if (forceHide) sb.classList.add('hidden-mobile');
                else sb.classList.toggle('hidden-mobile');
            }
        }

        // --- INIT ---
        window.onload = async () => {
            await initDB();
            console.log('DB Initialized. Amir credentials: amir / amiradmin');
        };
    </script>
</body>
</html>
